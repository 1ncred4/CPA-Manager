name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump when running manually on a branch (ignored for tag runs)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Resolve release version
        id: meta
        env:
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          short_sha="$(echo "${GITHUB_SHA}" | cut -c1-7)"

          # Highest existing semver tag like v1.2.3 (ignore non-semver / floating tags).
          previous_tag="$(
            git tag --list 'v*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1 \
              || true
          )"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
            if ! [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Tag ${tag} is not vMAJOR.MINOR.PATCH; skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Avoid double-publish when a previous main run already created this release.
            if gh release view "${tag}" >/dev/null 2>&1; then
              echo "Release ${tag} already exists; skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"
            echo "version=${tag}" >> "$GITHUB_OUTPUT"
            echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${previous_tag}" ]; then
            major=1
            minor=0
            patch=0
          else
            ver="${previous_tag#v}"
            IFS='.' read -r major minor patch <<< "${ver}"
            case "${BUMP}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch|*)
                patch=$((patch + 1))
                ;;
            esac
          fi

          tag="v${major}.${minor}.${patch}"

          # Extremely defensive: if the computed tag somehow already exists, keep bumping patch.
          while git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; do
            patch=$((patch + 1))
            tag="v${major}.${minor}.${patch}"
          done

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "create_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "Resolved next version: ${tag} (from ${previous_tag:-none}, bump=${BUMP})"

      - name: Install dependencies
        if: steps.meta.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Build all-in-one HTML
        if: steps.meta.outputs.skip != 'true'
        run: bun run build
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Prepare release assets
        if: steps.meta.outputs.skip != 'true'
        run: |
          cd dist
          mv index.html management.html
          ls -lh management.html

      - name: Generate release notes
        if: steps.meta.outputs.skip != 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          previous_tag="${{ steps.meta.outputs.previous_tag }}"
          short_sha="${{ steps.meta.outputs.short_sha }}"

          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${GITHUB_SHA}"
          else
            range="${GITHUB_SHA}"
          fi

          {
            echo "### ${tag}"
            echo
            echo "- Commit: \`${GITHUB_SHA}\` (\`${short_sha}\`)"
            echo "- Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "### Changes"
            echo
            git log --pretty=format:"- %h %s" "${range}" || true
            echo
            echo
            echo "Download asset: \`management.html\`"
          } > release-notes.md

      - name: Publish release
        if: steps.meta.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/management.html
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
